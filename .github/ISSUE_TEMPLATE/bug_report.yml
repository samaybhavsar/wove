name: Bug report
description: Something in Wove isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See …
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Versions
      description: WordPress, PHP, and browser versions.
      placeholder: "WP 6.8, PHP 8.2, Chrome 125"
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Screenshots or notes
      description: Anything else that helps — screenshots, console output, the page URL.
